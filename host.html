<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Host | Quiz Live MVP</title>
  <script>
    (function () {
      var build = '20260305_4';
      var url = new URL(window.location.href);
      if (url.searchParams.get('v') !== build) {
        url.searchParams.set('v', build);
        window.location.replace(url.toString());
      }
    })();
  </script>
  <link rel="stylesheet" href="./app.css?v=20260305_4" />
  <script>
    document.write('<script src="./runtime-config.js?v=' + Date.now() + '"><' + '/script>');
  </script>
  <script src="./config.js?v=20260305_4"></script>
  <script src="./js/shared.js?v=20260305_4"></script>
</head>
<body class="host-page">
  <main class="host-shell">
    <section class="card host-top">
      <div class="host-top-block">
        <span class="small">Код сесії</span>
        <span id="sessionCode" class="code host-code">------</span>
      </div>
      <div class="host-top-block host-top-status">
        <span class="small">Статус</span>
        <span id="sessionStatus" class="badge">lobby</span>
      </div>
    </section>

    <section class="card host-setup-card">
      <div class="host-setup-grid">
        <section class="host-mode-panel">
          <h2>Режим перед стартом</h2>
          <div id="modeCards" class="mode-cards"></div>
          <p id="modeHint" class="small"></p>
        </section>

        <section class="host-library-panel">
          <h2>Бібліотека квізів</h2>
          <label for="quizSelect">Обраний квіз</label>
          <select id="quizSelect"></select>
          <div class="row host-library-actions">
            <button id="refreshQuizzesBtn" class="btn-secondary" type="button">Оновити список</button>
          </div>

          <label for="quizFileInput">Завантажити JSON квізу</label>
          <input id="quizFileInput" type="file" accept="application/json,.json" />
          <div class="row host-library-actions">
            <button id="uploadQuizBtn" class="btn-primary" type="button">Зберегти в бібліотеку</button>
          </div>
          <p id="quizLibraryStatus" class="small"></p>
        </section>
      </div>
    </section>

    <section class="card host-control-card">
      <div class="host-control-grid">
        <div class="host-controls">
          <h2>Керування грою</h2>
          <p id="sessionMeta" class="small"></p>
          <div class="host-actions">
            <button id="createBtn" class="btn-primary">Створити лобі</button>
            <button id="startBtn" class="btn-primary" disabled>Старт</button>
            <button id="nextBtn" class="btn-secondary" disabled>Далі</button>
            <button id="finishBtn" class="btn-danger" disabled>Фініш</button>
            <button id="clearSavedBtn" class="btn-secondary" type="button">Очистити</button>
          </div>
          <p id="createStatus" class="small"></p>
          <p id="questionStatus" class="small"></p>
          <p id="reportLinks" class="small"></p>
        </div>

        <section class="host-participants">
          <h3>Учасники</h3>
          <ul id="participantsList"></ul>
        </section>
      </div>
    </section>

    <section class="card" id="leaderboardSection" style="display:none;">
      <h3>Лідерборд (фінал)</h3>
      <table class="table" id="leaderboardTable">
        <thead><tr><th>#</th><th>Нік</th><th>Бали</th></tr></thead>
        <tbody></tbody>
      </table>
    </section>
  </main>

  <script src="./js/host.js?v=20260305_4"></script>
</body>
</html>
